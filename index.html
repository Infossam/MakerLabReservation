<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메이커랩 회의실 예약</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
    <style>
        :root {
            --primary: #2563eb; --primary-dark: #1d4ed8; --bg-gray: #f8fafc; --border: #e2e8f0;
            --room1: #dbeafe; --room1-text: #1e40af; --room2: #dcfce7; --room2-text: #166534;
        }
        body { font-family: sans-serif; background-color: var(--bg-gray); margin: 0; padding: 10px; color: #1e293b; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 20px; }
        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 15px; }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
        
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        
        /* 네비게이션 스타일 */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .nav-controls { display: flex; align-items: center; gap: 10px; }
        .week-btn { background: #f1f5f9; border: 1px solid var(--border); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .week-btn:hover { background: #e2e8f0; }
        #week-display { font-weight: bold; font-size: 14px; min-width: 180px; text-align: center; }

        .calendar-grid { display: grid; grid-template-columns: 60px repeat(7, 1fr); border: 1px solid var(--border); background: #eee; gap: 1px; }
        .calendar-cell { background: white; min-height: 85px; padding: 4px; font-size: 11px; position: relative; }
        .cell-header { background: #f1f5f9; font-weight: bold; text-align: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .time-col { background: #f1f5f9; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        
        .reservation-block { border-radius: 4px; padding: 4px 6px; margin-bottom: 3px; font-size: 11px; font-weight: 800; box-shadow: 0 1px 2px rgba(0,0,0,0.1); border-left: 3px solid transparent; }
        .room1-block { background-color: var(--room1); color: var(--room1-text); border-left-color: var(--primary); }
        .room2-block { background-color: var(--room2); color: var(--room2-text); border-left-color: #22c55e; }
        
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #sync-btn { width: auto; padding: 6px 12px; background-color: #64748b; font-size: 12px; margin-top: 5px; }
        
        .message { margin-top: 10px; padding: 10px; border-radius: 6px; display: none; font-size: 13px; text-align: center; }
        .error { background-color: #fee2e2; color: #991b1b; display: block; }
        .success { background-color: #dcfce7; color: #166534; display: block; }
        .legend { display: flex; gap: 10px; font-size: 12px; margin-top: 5px; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 2px; }
    </style>
</head>
<body>
<div class="container">
    <header><h1>Maker Lab 회의실 예약</h1></header>
    <div class="main-layout">
        <div class="card">
            <div class="calendar-header">
                <div class="nav-controls">
                    <button class="week-btn" onclick="changeWeek(-7)">◀ 지난주</button>
                    <span id="week-display">주차 로딩 중...</span>
                    <button class="week-btn" onclick="changeWeek(7)">다음주 ▶</button>
                </div>
                <div style="text-align: right;">
                    <div class="legend">
                        <div class="legend-item"><div class="dot" style="background: var(--primary)"></div>1호실</div>
                        <div class="legend-item"><div class="dot" style="background: #22c55e"></div>2호실</div>
                    </div>
                    <button id="sync-btn" onclick="fetchReservations()">🔄 시트 데이터 불러오기</button>
                </div>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
        </div>
        <div class="card">
            <h3>예약 신청</h3>
            <form id="reservation-form">
                <div class="form-group"><label for="user-name">예약자명</label><input type="text" id="user-name" placeholder="이름 입력" required></div>
                <div class="form-group">
                    <label for="room-select">회의실</label>
                    <select id="room-select" required>
                        <option value="1호실">1호실</option>
                        <option value="2호실">2호실</option>
                    </select>
                </div>
                <div class="form-group"><label for="res-date">날짜</label><input type="date" id="res-date" required></div>
                <div class="form-group"><label for="start-time">시작 시간</label><select id="start-time" required></select></div>
                <div class="form-group"><label for="end-time">종료 시간</label><select id="end-time" required></select></div>
                <button type="submit" id="submit-btn">예약하기</button>
            </form>
            <div id="status-msg" class="message"></div>
        </div>
    </div>
</div>
