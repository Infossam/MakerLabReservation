<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메이커랩 회의실 예약</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg-gray: #f8fafc;
            --border: #e2e8f0;
            --room1: #dbeafe;
            --room1-text: #1e40af;
            --room2: #dcfce7;
            --room2-text: #166534;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            padding: 10px;
            color: #1e293b;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { margin: 10px 0; color: #0f172a; }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 15px;
        }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: 60px repeat(7, 1fr);
            border: 1px solid var(--border);
            background: #eee;
            gap: 1px;
        }

        .calendar-cell {
            background: white;
            min-height: 85px;
            padding: 4px;
            font-size: 11px;
            position: relative;
        }

        .cell-header {
            background: #f1f5f9;
            font-weight: bold;
            text-align: center;
            padding: 10px 0;
            font-size: 12px;
            border-bottom: 1px solid var(--border);
        }

        .time-col {
            background: #f1f5f9;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reservation-block {
            border-radius: 4px;
            padding: 4px 6px;
            margin-bottom: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 11px;
            font-weight: 800;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            border-left: 3px solid transparent;
        }

        .room1-block { background-color: var(--room1); color: var(--room1-text); border-left-color: var(--primary); }
        .room2-block { background-color: var(--room2); color: var(--room2-text); border-left-color: #22c55e; }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background-color: var(--primary-dark); }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }

        #sync-btn {
            width: auto;
            padding: 6px 12px;
            background-color: #64748b;
            font-size: 12px;
        }

        .message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            display: none;
            font-size: 13px;
            text-align: center;
        }

        .error { background-color: #fee2e2; color: #991b1b; display: block; border: 1px solid #fecaca; }
        .success { background-color: #dcfce7; color: #166534; display: block; border: 1px solid #bbf7d0; }

        .legend { display: flex; gap: 10px; font-size: 12px; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 2px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Maker Lab 회의실 예약</h1>
    </header>

    <div class="main-layout">
        <div class="card">
            <div class="calendar-header">
                <div>
                    <h3 style="margin:0 0 5px 0;">이번 주 예약 현황</h3>
                    <button id="sync-btn" onclick="fetchReservations()">🔄 시트 데이터 불러오기</button>
                </div>
                <div class="legend">
                    <div class="legend-item"><div class="dot" style="background: var(--primary)"></div>1호실</div>
                    <div class="legend-item"><div class="dot" style="background: #22c55e"></div>2호실</div>
                </div>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>

        <div class="card">
            <h3>예약 신청</h3>
            <form id="reservation-form">
                <div class="form-group">
                    <label>예약자명</label>
                    <input type="text" id="user-name" placeholder="이름 입력" required>
                </div>
                <div class="form-group">
                    <label>회의실</label>
                    <select id="room-select" required>
                        <option value="1호실">1호실</option>
                        <option value="2호실">2호실</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>날짜</label>
                    <input type="date" id="res-date" required>
                </div>
                <div class="form-group">
                    <label>시작 시간</label>
                    <select id="start-time" required></select>
                </div>
                <div class="form-group">
                    <label>종료 시간</label>
                    <select id="end-time" required></select>
                </div>
                <button type="submit" id="submit-btn">예약하기</button>
            </form>
            <div id="status-msg" class="message"></div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyDLpqn8-_WNIYTATQm5MMCAFE9XKK9HyimpTKjLW1HIqtdPdlTFoS4PrQ0RBku1G8v/exec"; 
    
    let reservations = [];
    const businessHours = { start: 9, end: 20 };

    function getLocalDateString(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    const today = new Date();
    today.setHours(0,0,0,0);
    
    window.onload = () => {
        setupForm();
        renderCalendar();
        loadLocalData();
        fetchReservations(); 
    };

    function setupForm() {
        const dateInput = document.getElementById('res-date');
        dateInput.min = getLocalDateString(today);
        
        const limit = new Date(today);
        const offset = (5 - today.getDay() + 7) % 7 + 7;
        limit.setDate(today.getDate() + offset);
        dateInput.max = getLocalDateString(limit);

        const startSelect = document.getElementById('start-time');
        const endSelect = document.getElementById('end-time');
        startSelect.innerHTML = '';
        endSelect.innerHTML = '';

        for (let i = businessHours.start; i < businessHours.end; i++) {
            const t = `${String(i).padStart(2, '0')}:00`;
            startSelect.innerHTML += `<option value="${t}">${t}</option>`;
            const et = `${String(i+1).padStart(2, '0')}:00`;
            endSelect.innerHTML += `<option value="${et}">${et}</option>`;
        }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        grid.appendChild(createCell('', 'cell-header'));

        const sun = new Date(today);
        sun.setDate(today.getDate() - today.getDay());

        const weekDates = [];
        for (let i = 0; i < 7; i++) {
            const d = new Date(sun);
            d.setDate(sun.getDate() + i);
            weekDates.push(d);
            const dayName = ['일', '월', '화', '수', '목', '금', '토'][d.getDay()];
            grid.appendChild(createCell(`${d.getMonth()+1}/${d.getDate()}(${dayName})`, 'cell-header'));
        }

        for (let h = businessHours.start; h < businessHours.end; h++) {
            grid.appendChild(createCell(`${String(h).padStart(2, '0')}:00`, 'time-col'));
            for (let i = 0; i < 7; i++) {
                const dateStr = getLocalDateString(weekDates[i]);
                const cell = createCell('', 'calendar-cell');
                cell.id = `cell-${dateStr}-${h}`;
                grid.appendChild(cell);
            }
        }
        updateUI();
    }

    function createCell(txt, cls) {
        const div = document.createElement('div');
        div.className = cls;
        div.innerText = txt;
        return div;
    }

    function loadLocalData() {
        const data = localStorage.getItem('mlab_final_cache');
        if (data) {
            try { reservations = JSON.parse(data); updateUI(); } catch(e) {}
        }
    }

    async function fetchReservations() {
        const btn = document.getElementById('sync-btn');
        const originalTxt = btn.innerText;
        btn.innerText = '⏳ 불러오는 중...';
        try {
            const response = await fetch(`${API_URL}?t=${Date.now()}`);
            const data = await response.json();
            if (Array.isArray(data)) {
                reservations = data;
                localStorage.setItem('mlab_final_cache', JSON.stringify(reservations));
                updateUI();
                showMsg('동기화 완료!', 'success');
            }
        } catch (err) {
            console.error('Fetch error:', err);
            showMsg('동기화 실패. GAS 설정을 확인하세요.', 'error');
        } finally {
            btn.innerText = originalTxt;
        }
    }

    function updateUI() {
        document.querySelectorAll('.reservation-block').forEach(el => el.remove());
        reservations.forEach(res => {
            if (!res.startTime || !res.date) return;
            const h = parseInt(res.startTime.split(':')[0]);
            const cleanDate = res.date.split('T')[0]; 
            const cell = document.getElementById(`cell-${cleanDate}-${h}`);
            
            if (cell) {
                const block = document.createElement('div');
                block.className = `reservation-block ${res.room.includes('1') ? 'room1-block' : 'room2-block'}`;
                block.innerText = `${res.room.replace('호실','')}: ${res.name}`;
                cell.appendChild(block);
            }
        });
    }

    document.getElementById('reservation-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const resData = {
            name: document.getElementById('user-name').value,
            room: document.getElementById('room-select').value,
            date: document.getElementById('res-date').value,
            startTime: document.getElementById('start-time').value,
            endTime: document.getElementById('end-time').value,
            timestamp: new Date().toLocaleString('ko-KR')
        };

        const conflict = reservations.some(r => 
            r.date === resData.date && r.room === resData.room && 
            ((resData.startTime >= r.startTime && resData.startTime < r.endTime) || 
             (resData.endTime > r.startTime && resData.endTime <= r.endTime))
        );

        if (conflict) {
            showMsg('이미 예약된 시간입니다.', 'error');
            return;
        }

        try {
            btn.disabled = true;
            btn.innerText = '전송 중...';
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(resData) });
            showMsg('예약 신청 완료!', 'success');
            setTimeout(fetchReservations, 2500);
            document.getElementById('reservation-form').reset();
            setupForm();
        } catch (err) {
            showMsg('전송 오류', 'error');
        } finally {
            btn.disabled = false;
            btn.innerText = '예약하기';
        }
    };

    function showMsg(m, t) {
        const el = document.getElementById('status-msg');
        el.innerText = m;
        el.className = `message ${t}`;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }
</script>

</body>
</html>
